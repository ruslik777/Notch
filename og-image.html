<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image — Notch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0B0F14;
      font-family: 'Barlow', sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    .grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .glow {
      position: absolute; width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(78,204,163,.11) 0%, transparent 65%);
      right: -80px; top: -80px; pointer-events: none;
    }
    .glow2 {
      position: absolute; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(78,204,163,.06) 0%, transparent 65%);
      left: -60px; bottom: -60px; pointer-events: none;
    }

    .inner {
      position: relative; z-index: 1;
      padding: 60px 72px;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 268px;
      gap: 48px;
      align-items: center;
    }

    /* Left */
    .left { display: flex; flex-direction: column; }

    .logo {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 44px;
    }
    .logo-mark {
      width: 50px; height: 50px;
      background: #4ECCA3; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 800; color: #0B0F14;
    }
    .logo-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700;
      color: #E6EDF8; letter-spacing: .02em;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 100px; font-weight: 800;
      line-height: .93; letter-spacing: -.02em;
      color: #E6EDF8; margin-bottom: 22px;
    }
    h1 .g { color: #4ECCA3; }

    .sub {
      font-size: 21px; color: #667796;
      line-height: 1.5; margin-bottom: 38px;
      font-weight: 500;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 9px;
      border: 1px solid rgba(78,204,163,.32);
      background: rgba(78,204,163,.08);
      color: #4ECCA3; padding: 9px 20px;
      border-radius: 100px;
      font-size: 14px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      width: fit-content;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: #4ECCA3; border-radius: 50%; flex-shrink: 0;
    }

    /* Right stats */
    .stats { display: flex; flex-direction: column; gap: 10px; }

    .stat {
      background: #131920;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px; padding: 18px 22px;
    }
    .stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 46px; font-weight: 800;
      color: #4ECCA3; line-height: 1; letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 13px; color: #667796; font-weight: 500; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="inner">
    <div class="left">
      <div class="logo">
        <div class="logo-mark">N</div>
        <div class="logo-name">Notch</div>
      </div>

      <h1>Финансы<br><span class="g">с прогрессом.</span></h1>

      <p class="sub">
        Квесты. Стрики. Уровни.<br>
        Как Duolingo — только для кошелька.
      </p>

      <div class="badge">
        <span class="badge-dot"></span>
        Предзапись открыта
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">&#128293;&nbsp;47</div>
        <div class="stat-label">дней стрика</div>
      </div>
      <div class="stat">
        <div class="stat-num">14</div>
        <div class="stat-label">дней фин. свободы</div>
      </div>
      <div class="stat">
        <div class="stat-num">Ур.&nbsp;12</div>
        <div class="stat-label">Экономист</div>
      </div>
    </div>
  </div>
</body>
</html>

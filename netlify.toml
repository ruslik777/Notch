[build]
  command = "sed -i 's|__SUPABASE_URL__|'\"$SUPABASE_URL\"'|g' src/js/config.js && sed -i 's|__SUPABASE_ANON_KEY__|'\"$SUPABASE_ANON_KEY\"'|g' src/js/config.js"
  publish = "."

[[headers]]
  for = "/app.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://open.er-api.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; media-src blob: mediastream:; connect-src 'self' https://*.supabase.co https://open.er-api.com https://cdn.jsdelivr.net;"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=*"
